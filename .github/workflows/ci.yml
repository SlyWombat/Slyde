name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Sync workspace
        run: uv sync
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Ruff (format)
        run: uv run ruff format --check .
      - name: Mypy (strict)
        run: uv run mypy
      - name: Pytest
        run: uv run pytest --cov=memento_core --cov=memento_emulator
