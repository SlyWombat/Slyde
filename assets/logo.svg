<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Slyde">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141c2e"/>
      <stop offset="1" stop-color="#0b0e14"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#243b6b"/>
      <stop offset="0.5" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#ffb27a"/>
    </linearGradient>
    <clipPath id="photo"><rect x="74" y="70" width="108" height="92" rx="13"/></clipPath>
  </defs>

  <!-- app tile -->
  <rect x="8" y="8" width="240" height="240" rx="54" fill="url(#tile)" stroke="#222a3a" stroke-width="2"/>

  <!-- the carousel: previous / next slides peek behind the front photo (a slideshow = "Slyde") -->
  <rect x="40" y="84" width="100" height="64" rx="12" fill="#1b2440"/>
  <rect x="116" y="84" width="100" height="64" rx="12" fill="#1b2440"/>
  <rect x="52" y="78" width="152" height="76" rx="13" fill="#243056"/>

  <!-- front photo card: a sunset, the current slide -->
  <g clip-path="url(#photo)">
    <rect x="74" y="70" width="108" height="92" fill="url(#sky)"/>
    <circle cx="106" cy="112" r="17" fill="#ffe1a3"/>
    <path d="M74 150 L104 122 L128 142 L156 116 L182 138 L182 162 L74 162 Z" fill="#1b2740"/>
    <path d="M74 162 L100 144 L128 158 L156 142 L182 160 L182 162 Z" fill="#0b0e14"/>
  </g>
  <rect x="74" y="70" width="108" height="92" rx="13" fill="none" stroke="#aeb9d6" stroke-width="2.5"/>

  <!-- slide indicator: the current slide is active -->
  <circle cx="110" cy="186" r="4.5" fill="#36405e"/>
  <circle cx="128" cy="186" r="6" fill="#5b8cff"/>
  <circle cx="146" cy="186" r="4.5" fill="#36405e"/>
</svg>
