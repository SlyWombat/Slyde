# Example Dockge stack for "kdocker" (a NanoPi M5 / arm64 running Dockge).
# This is ONE example deployment — adjust the values in .env for your environment.
# Build the image first on the host:  docker build -t memento-manager:latest <repo>
services:
  memento-manager:
    image: memento-manager:latest
    container_name: memento-manager
    restart: unless-stopped
    env_file: .env
    ports:
      - "8090:8080"
    volumes:
      - /data/memento/data:/data
