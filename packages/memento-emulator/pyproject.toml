[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "memento-emulator"
version = "0.1.1"
description = "A faithful emulator of the Memento Smart Frame's server side, for testing and dev."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "memento-core",
    "pillow>=10.4",
]

# `display` mode (fullscreen rendering on a real screen, e.g. a Pi) needs SDL via pygame.
# Headless emulator/CI does not require this.
[project.optional-dependencies]
display = ["pygame-ce>=2.5"]

[project.scripts]
memento-emulator = "memento_emulator.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/memento_emulator"]

[tool.hatch.metadata]
allow-direct-references = true
